name: Publish

on:
  push:
    # tags:
    #   - "v*"
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write   # THIS is the magic

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: 20
        registry-url: https://registry.npmjs.org

    # Remove the _authToken that setup-node injects — lets npm use OIDC instead
    - run: npm config delete //registry.npmjs.org/:_authToken --location project

    - run: npm ci
    - run: npm run build

    - run: npm publish --provenance --access public